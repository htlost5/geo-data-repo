name: Update Latest Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set as latest'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

jobs:
  update-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Update latest.json
        run: |
          mkdir -p gh-pages/meta
          echo "{\"version\": \"${{ github.event.inputs.version }}\", \"srcFolder\": \"/releases/${{ github.event.inputs.version }}\"}" \
            > gh-pages/meta/latest.json

      - name: Commit & Push
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add meta/latest.json
          git commit -m "Update latest.json to ${{ github.event.inputs.version }}" || echo "No changes"
          git push origin gh-pages