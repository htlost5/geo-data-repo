name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release
        run: node scripts/build-release.js ${{ steps.version.outputs.version }}

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path : gh-pages
          fetch-depth: 0

      - name: Copy release to gh-pages
        run: |
          rm -rf gh-pages/releases/${{ steps.version.outputs.version }}
          mkdir -p gh-pages/releases/${{ steps.version.outputs.version }}
          
          cp -r releases/${{ steps.version.outputs.version }}/* gh-pages/releases/${{ steps.version.outputs.version }}/

      - name: Update latest.json
        run: |
          node scripts/update-latest.js ${{ steps.version.outputs.version }}
          rm -f gh-pages/meta/latest.json
          mkdir -p gh-pages/meta
          
          cp meta/latest.json gh-pages/meta/latest.json

      - name: Commit & Push
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add releases meta
          git commit -m "Release ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push origin gh-pages