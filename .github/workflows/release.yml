name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release
        run: node scripts/build-release.js ${{ steps.version.outputs.version }}

      - name: Commit releases
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add releases/${{ steps.version.outputs.version }}
          git commit -m "release ${{ steps.version.outputs.version }}" || echo "No changes"
          git push

      - name: Update latest.json
        run: node scripts/update-latest.js ${{ steps.version.outputs.version }}

      - name: Commit latest
        run: |
          git add meta/latest.json
          git commit -m "update latest -> ${{ steps.version.outputs.version }}" || echo "No changes"
          git push